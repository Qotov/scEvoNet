name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}
      - name: Ruff check
        run: uv run ruff check scevonet tests
      - name: Ruff format
        run: uv run ruff format --check scevonet tests
      - name: Pytest
        run: uv run pytest tests/ -q
