<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 128" role="img" aria-labelledby="title desc">
  <title id="title">scEvoNet logo</title>
  <desc id="desc">Network nodes and edges next to the wordmark scEvoNet</desc>
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b4965"/>
      <stop offset="100%" stop-color="#62b6cb"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#62b6cb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ee6c4d" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Graph icon: bipartite-style motif -->
  <g transform="translate(12, 16)">
    <line x1="28" y1="24" x2="72" y2="24" stroke="url(#edge)" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="56" x2="72" y2="56" stroke="url(#edge)" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="24" x2="28" y2="56" stroke="#bee9e8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="24" x2="72" y2="56" stroke="#bee9e8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="24" x2="72" y2="56" stroke="#bee9e8" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <circle cx="28" cy="24" r="10" fill="url(#sg)" stroke="#fff" stroke-width="2"/>
    <circle cx="72" cy="24" r="10" fill="#62b6cb" stroke="#fff" stroke-width="2"/>
    <circle cx="28" cy="56" r="10" fill="#ee6c4d" stroke="#fff" stroke-width="2"/>
    <circle cx="72" cy="56" r="10" fill="#1b4965" stroke="#fff" stroke-width="2"/>
    <circle cx="50" cy="88" r="9" fill="#5fa8d3" stroke="#fff" stroke-width="2"/>
    <line x1="36" y1="66" x2="46" y2="80" stroke="#bee9e8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="66" x2="54" y2="80" stroke="#bee9e8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="132" y="78" font-family="ui-sans-serif, system-ui, Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#1b4965" letter-spacing="-0.02em">scEvoNet</text>
  <text x="134" y="104" font-family="ui-sans-serif, system-ui, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#5c6770" letter-spacing="0.04em">single-cell &#183; cell states &#183; gene programs</text>
</svg>
